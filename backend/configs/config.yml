project:
  name: hospital_market_intel
  default_states: ["FL", "GA", "AL"]

paths:
  # Default matches data/raw/final_tier1_all_percentiles.parquet or tier1/ subfolder
  tier1_parquet: data/raw/final_tier1_all_percentiles.parquet
  output_gpkg: data/zcta_hospital_potential.gpkg

hospital_potential:
  use_direct_columns:
    - attractiveness_score_opt2
    - hospital_potential
  factors: []
  fallback: 50.0

entity_layer:
  entity_count: 0
  hospital_count: 0
  avg_entity_score: 0.0
  avg_confidence: 0.0

outputs:
  write_gpkg: true